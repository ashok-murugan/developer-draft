# Application Configuration
spring.application.name=smart-explainer

# Server Configuration
server.port=8080

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:your-api-key-here}
gemini.api.base-url=https://generativelanguage.googleapis.com
gemini.api.timeout=30

# Logging
logging.level.com.smartexplainer=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
